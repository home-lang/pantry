name: Discord Notify
description: Send a Discord webhook notification with embed formatting

inputs:
  title:
    description: Embed title
    required: true
  description:
    description: Embed description
    required: false
    default: ''
  status:
    description: 'Status: success, failure, or warning'
    required: true
    default: failure
  fields:
    description: 'JSON array of {name, value, inline?} objects'
    required: false
    default: '[]'
  webhook_url:
    description: Discord webhook URL
    required: true

runs:
  using: composite
  steps:
    - name: Send Discord notification
      shell: bash
      env:
        TITLE: ${{ inputs.title }}
        DESCRIPTION: ${{ inputs.description }}
        STATUS: ${{ inputs.status }}
        FIELDS: ${{ inputs.fields }}
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        WORKFLOW_NAME: ${{ github.workflow }}
      run: |
        # Entire block is wrapped so notification errors never fail the parent workflow
        _send_discord() {
          # Map status to color
          case "$STATUS" in
            success) COLOR=3066993 ;;   # green
            warning) COLOR=16776960 ;;  # yellow
            failure) COLOR=15158332 ;;  # red
            *) COLOR=10181046 ;;        # purple/unknown
          esac

          # Validate fields JSON, fall back to empty array
          if ! echo "$FIELDS" | jq -e '.' >/dev/null 2>&1; then
            FIELDS='[]'
          fi

          # Append clickable workflow run link
          FIELDS_WITH_LINK=$(echo "$FIELDS" | jq -c \
            --arg url "$RUN_URL" \
            --arg name "$WORKFLOW_NAME" \
            '. + [{"name": "Workflow Run", "value": ("[" + $name + "](" + $url + ")"), "inline": false}]')

          # Build payload safely via jq (handles all escaping)
          PAYLOAD=$(jq -nc \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --argjson color "$COLOR" \
            --argjson fields "$FIELDS_WITH_LINK" \
            '{
              embeds: [{
                title: $title,
                description: $description,
                color: $color,
                fields: $fields,
                timestamp: (now | todate)
              }]
            }')

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
        }
        _send_discord || echo "::warning::Discord notification failed (non-fatal)"
