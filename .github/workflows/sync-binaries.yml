name: Sync Pre-Built Binaries

on:
  schedule:
    # Daily. A full build/sync can exceed 6h, and the serial `sync-binaries`
    # concurrency group means a more frequent schedule just cancels/queues runs.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated package domains (empty = all pre-built)'
        required: false
        type: string
      force:
        description: 'Force re-upload even if already in S3'
        required: false
        type: boolean
        default: false
      multi-version:
        description: 'Sync all important versions (LTS, major releases)'
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-binaries
  cancel-in-progress: false

env:
  # Object storage provider. Set the repo variable STORAGE_PROVIDER=hetzner (or
  # backblaze) plus the S3_* vars and the S3_ACCESS_KEY_ID/S3_SECRET_ACCESS_KEY
  # secrets below to sync binaries there. Defaults to AWS S3 (unchanged).
  STORAGE_PROVIDER: ${{ vars.STORAGE_PROVIDER || 'aws' }}
  S3_BUCKET: ${{ vars.S3_BUCKET || 'pantry-registry' }}
  S3_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
  S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
  AWS_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
  # Provider-agnostic S3-compatible credentials (Hetzner Object Storage,
  # Backblaze B2, etc.). Used for any non-AWS provider; unset ⇒ AWS path unaffected.
  S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
  S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

permissions:
  contents: read

jobs:
  classify-targets:
    name: Classify requested packages
    if: github.event.inputs.packages != ''
    runs-on: ubuntu-latest
    outputs:
      has_source: ${{ steps.classify.outputs.has_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Classify package domains
        id: classify
        run: |
          PKGS="${{ github.event.inputs.packages || '' }}"
          CLASSIFICATION=$(bun packages/ts-pantry/scripts/classify-packages.ts "$PKGS")
          echo "$CLASSIFICATION"
          echo "$CLASSIFICATION" >> "$GITHUB_OUTPUT"

  # Job 1: Sync pre-built binary packages (fast downloads, no compilation)
  sync-prebuilt:
    name: Sync pre-built (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-x86-64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install dependencies
        run: bun install

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libreadline-dev zlib1g-dev

      - name: Sync pre-built binaries to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          cd packages/ts-pantry

          PKGS="${{ github.event.inputs.packages || '' }}"
          # Validate package input (only allow safe characters — no whitespace)
          PKGS=$(echo "$PKGS" | tr -cd 'a-zA-Z0-9._\-/,')
          if [ -n "$PKGS" ]; then
            PKGS=$(bun scripts/classify-packages.ts "$PKGS" --field=binary)
            if [ -z "$PKGS" ]; then
              echo "No binary-sync packages requested; skipping pre-built sync"
              exit 0
            fi
          fi
          FORCE="${{ github.event.inputs.force || 'false' }}"
          MULTI="${{ github.event.inputs.multi-version || 'false' }}"

          ARGS="-b $S3_BUCKET -r $AWS_REGION"

          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          if [ "$MULTI" = "true" ]; then
            ARGS="$ARGS --multi-version"
          fi

          if [ -n "$PKGS" ]; then
            IFS=',' read -ra DOMAINS <<< "$PKGS"
            for d in "${DOMAINS[@]}"; do
              d=$(echo "$d" | xargs) # trim whitespace
              ARGS="$ARGS -p $d"
            done
          fi

          echo "Running: bun scripts/sync-packages.ts $ARGS"
          bun scripts/sync-packages.ts $ARGS
        timeout-minutes: 240

  verify-metadata:
    name: Verify binary metadata
    needs: sync-prebuilt
    if: needs.sync-prebuilt.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install dependencies
        run: bun install

      - name: Verify and repair binary metadata
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -o pipefail
          cd packages/ts-pantry

          PKGS="${{ github.event.inputs.packages || '' }}"
          PKGS=$(echo "$PKGS" | tr -cd 'a-zA-Z0-9._\-/,')

          ARGS="-b $S3_BUCKET -r $AWS_REGION --repair --delete-strays --require-configured-platforms"
          if [ -n "$PKGS" ]; then
            PKGS=$(bun scripts/classify-packages.ts "$PKGS" --field=binary)
            if [ -z "$PKGS" ]; then
              echo "No binary-sync packages requested; skipping metadata verification"
              exit 0
            fi
            IFS=',' read -ra DOMAINS <<< "$PKGS"
            for d in "${DOMAINS[@]}"; do
              d=$(echo "$d" | xargs)
              ARGS="$ARGS -p $d"
            done
          else
            ARGS="$ARGS --all-binary-sync"
          fi

          echo "Running: bun scripts/verify-binary-metadata.ts $ARGS"
          bun scripts/verify-binary-metadata.ts $ARGS

  # Job 2: Discover how many buildable packages exist for batching
  # Skipped when specific packages are provided (targeted build)
  discover:
    name: Discover buildable packages
    if: github.event.inputs.packages == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      batches: ${{ steps.discover.outputs.batches }}
      total: ${{ steps.discover.outputs.total }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Discover packages
        id: discover
        run: |
          cd packages/ts-pantry
          TOTAL=$(bun scripts/build-all-packages.ts --count-only 2>/dev/null | tail -1)
          if [ -z "$TOTAL" ] || ! echo "$TOTAL" | grep -qE '^[0-9]+$'; then
            echo "::error::Failed to discover package count (got: '$TOTAL')"
            exit 1
          fi
          echo "total=$TOTAL"
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          BATCH_SIZE=50
          LAST_BATCH=$(( (TOTAL - 1) / BATCH_SIZE ))
          # Generate JSON array [0, 1, 2, ..., LAST_BATCH]
          BATCHES=$(python3 -c "import json; print(json.dumps(list(range($LAST_BATCH + 1))))")
          echo "batches=$BATCHES"
          echo "batches=$BATCHES" >> $GITHUB_OUTPUT

  # Job 3a: Build specific packages (targeted — fast, no batching)
  build-targeted:
    name: Build targeted (${{ matrix.platform.name }})
    needs: classify-targets
    if: github.event.inputs.packages != '' && needs.classify-targets.outputs.has_source == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-15
            name: darwin-arm64
          - os: ubuntu-latest
            name: linux-x86-64
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: read
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install dependencies
        run: bun install

      - name: Preflight source build
        id: source-preflight
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -o pipefail
          cd packages/ts-pantry

          FORCE="${{ github.event.inputs.force || 'false' }}"
          if [ "$FORCE" = "true" ]; then
            echo "Force enabled; build tools are required"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VALIDATED_PKGS=$(echo "${{ github.event.inputs.packages }}" | tr -cd 'a-zA-Z0-9._\-/,')
          ARGS="-b $S3_BUCKET -r $AWS_REGION --platform ${{ matrix.platform.name }} -p $VALIDATED_PKGS"
          NEEDS_BUILD=$(bun scripts/build-all-packages.ts $ARGS --needs-build | tail -1)
          echo "needs_build=$NEEDS_BUILD" >> "$GITHUB_OUTPUT"
          if [ "$NEEDS_BUILD" = "false" ]; then
            echo "All selected source artifacts already exist in S3; skipping toolchain setup"
          fi

      - name: Free disk space (Linux)
        if: runner.os == 'Linux' && steps.source-preflight.outputs.needs_build != 'false'
        run: |
          # GitHub runners ship ~25-30GB of preinstalled SDKs we never use.
          # Large source builds (e.g. juju + its k8s/cloud deps) otherwise
          # exhaust the disk mid-build ("No space left on device").
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
            /usr/local/share/boost /usr/share/swift \
            /opt/hostedtoolcache/PyPy /opt/hostedtoolcache/Ruby \
            /usr/local/lib/node_modules /usr/share/miniconda \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell || true
          sudo docker image prune --all --force || true
          # Relocate heavy build trees to the large /mnt volume (~70GB) instead of
          # the ~20GB root volume; build-all-packages.ts honors BUILDKIT_ROOT.
          sudo mkdir -p /mnt/buildkit && sudo chown "$(id -u):$(id -g)" /mnt/buildkit
          echo "BUILDKIT_ROOT=/mnt/buildkit" >> "$GITHUB_ENV"
          df -h / /mnt

      - name: Install build tools (Linux)
        if: runner.os == 'Linux' && steps.source-preflight.outputs.needs_build != 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libreadline-dev zlib1g-dev libssl-dev \
            cmake meson ninja-build patchelf pkg-config \
            autoconf automake libtool gettext intltool \
            libffi-dev libexpat1-dev libbz2-dev liblzma-dev \
            libncurses5-dev libsqlite3-dev \
            python3-venv python3-pip python3-dev \
            libcurl4-openssl-dev libxml2-dev libonig-dev \
            ruby ruby-dev scons \
            gperf bison flex texinfo nasm yasm \
            libgmp-dev libmpfr-dev libmpc-dev \
            libuv1-dev libpcre2-dev libevent-dev \
            libglib2.0-dev libpixman-1-dev \
            libgit2-dev libssh2-1-dev libhttp-parser-dev \
            libasound2-dev libdbus-1-dev libsystemd-dev \
            protobuf-compiler libprotobuf-dev \
            nettle-dev libp11-kit-dev \
            libboost-all-dev libsndfile1-dev \
            libjpeg-dev libpng-dev libtiff-dev libwebp-dev \
            libfreetype-dev libharfbuzz-dev \
            libltdl-dev libacl1-dev libattr1-dev \
            liblz4-dev libzstd-dev libxxhash-dev \
            libyaml-dev libjansson-dev \
            libedit-dev libelf-dev \
            tcl-dev tk-dev \
            libunwind-dev libdw-dev \
            libzip-dev liblapack-dev gfortran \
            python3-lxml python3-libxml2 \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev \
            libxinerama-dev libxcomposite-dev libxdamage-dev \
            libxcursor-dev libxi-dev libxtst-dev \
            libxmu-dev libxt-dev libxaw7-dev libxres-dev \
            libsm-dev libice-dev libxpm-dev \
            libxxf86vm-dev libxshmfence-dev libxv-dev libxss-dev \
            x11proto-dev xtrans-dev xutils-dev xauth \
            libxkbcommon-dev libxkbfile-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-image0-dev libxcb-util-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-shm0-dev \
            libwayland-dev libfontconfig1-dev \
            gobject-introspection libgirepository1.0-dev \
            libatk1.0-dev libcairo2-dev libcairo-gobject2 \
            libpango1.0-dev libgtk-3-dev \
            librsvg2-dev libsecret-1-dev libjson-glib-dev \
            libsoup2.4-dev libgdk-pixbuf-2.0-dev \
            libva-dev libegl-dev libgbm-dev libdrm-dev \
            libgl-dev libglu1-mesa-dev \
            clang llvm-dev libclang-dev \
            libgnutls28-dev liblua5.4-dev \
            libcap-dev libcap-ng-dev libslirp-dev libssh-dev \
            libspeexdsp-dev libmaxminddb-dev libsmi2-dev \
            libc-ares-dev libre2-dev libpcap-dev \
            libnl-3-dev libnl-genl-3-dev \
            libpam0g-dev libudev-dev \
            libarchive-dev libusb-1.0-0-dev \
            libjemalloc-dev libvterm-dev \
            libxslt1-dev \
            libsdl2-dev libsdl2-gfx-dev libsdl2-mixer-dev libsdl2-image-dev \
            libsdl2-ttf-dev libsdl2-net-dev libplist-dev \
            libgc-dev \
            libpaper-dev \
            libimagequant-dev \
            libassuan-dev libgpg-error-dev \
            libfido2-dev \
            libdouble-conversion-dev libgoogle-glog-dev libgflags-dev \
            libsodium-dev liblzo2-dev libsnappy-dev libbrotli-dev \
            doxygen xsltproc docbook-xsl xmlto

      - name: Setup Xcode (macOS)
        if: runner.os == 'macOS' && steps.source-preflight.outputs.needs_build != 'false'
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
            echo "Selected Xcode: $XCODE_PATH"
          else
            echo "No Xcode 26.x found, using default"
          fi
          swift --version
          xcodebuild -version

      - name: Cache Homebrew packages
        if: runner.os == 'macOS' && steps.source-preflight.outputs.needs_build != 'false'
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/opt
            /opt/homebrew/lib
            /opt/homebrew/include
          key: brew-build-tools-${{ runner.os }}-v2
          restore-keys: |
            brew-build-tools-${{ runner.os }}-

      - name: Install build tools (macOS)
        if: runner.os == 'macOS' && steps.source-preflight.outputs.needs_build != 'false'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew install cmake meson ninja pkg-config autoconf automake libtool gettext gnu-sed scons \
            gcc go boost libsndfile jpeg-turbo libpng libtiff webp freetype harfbuzz \
            libyaml jansson libedit libzip lapack nasm libogg libvorbis flac \
            gobject-introspection cairo pango atk gtk+3 glib gdk-pixbuf librsvg json-glib libsoup \
            gnutls libgcrypt libgpg-error libassuan libksba libusb pcre2 \
            libarchive jemalloc lua protobuf grpc c-ares re2 capnp \
            libsecret libfido2 double-conversion glog gflags \
            libsodium lzo snappy brotli \
            doxygen docbook-xsl sdl2 sdl2_ttf sdl2_mixer sdl2_gfx || true
          # Keep Homebrew cmake (4.x) — pip cmake 3.x crashes with Abort trap: 6 on ARM64.
          # Any packages needing cmake <4 should use S3 cmake.org dep or package-overrides.

      - name: Fix Python setuptools (Linux)
        if: runner.os == 'Linux' && steps.source-preflight.outputs.needs_build != 'false'
        run: |
          # The Debian-patched wheel at /usr/lib/python3/dist-packages/ has install_layout
          # which causes "AttributeError: install_layout" when building wheels.
          # pip install --upgrade installs to a LOWER priority path, so we must actually
          # remove the Debian-patched files and replace them with standard PyPI versions.
          sudo rm -rf /usr/lib/python3/dist-packages/setuptools* \
                      /usr/lib/python3/dist-packages/wheel* \
                      /usr/lib/python3/dist-packages/pkg_resources* \
                      /usr/lib/python3/dist-packages/_distutils_hack* 2>/dev/null || true
          sudo pip3 install --break-system-packages setuptools wheel 2>/dev/null || true

      - name: Setup Rust toolchain
        if: steps.source-preflight.outputs.needs_build != 'false'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source "$HOME/.cargo/env"
          rustup update stable
          cargo install cargo-c 2>/dev/null || true
          echo "Rust: $(rustc --version), Cargo: $(cargo --version)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          python3 -m pip install --break-system-packages setuptools meson 2>/dev/null || pip3 install --break-system-packages setuptools meson 2>/dev/null || true

      - name: Build targeted packages
        if: steps.source-preflight.outputs.needs_build != 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/ts-pantry

          FORCE="${{ github.event.inputs.force || 'false' }}"
          # Validate package input (only allow safe characters)
          VALIDATED_PKGS=$(echo "${{ github.event.inputs.packages }}" | tr -cd 'a-zA-Z0-9._\-/,')
          ARGS="-b $S3_BUCKET -r $AWS_REGION --platform ${{ matrix.platform.name }} -p $VALIDATED_PKGS"

          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "Running: bun scripts/build-all-packages.ts $ARGS"
          bun scripts/build-all-packages.ts $ARGS
        timeout-minutes: 55

  # Job 3b: Build packages from source in batches (full run)
  build:
    name: Build batch ${{ matrix.batch }} (${{ matrix.platform.name }})
    needs: discover
    if: github.event.inputs.packages == '' && needs.discover.outputs.total != '0'
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.discover.outputs.batches) }}
        platform:
          - os: macos-15
            name: darwin-arm64
          - os: ubuntu-latest
            name: linux-x86-64
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: read
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install dependencies
        run: bun install

      - name: Preflight source build
        id: source-preflight
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -o pipefail
          cd packages/ts-pantry

          FORCE="${{ github.event.inputs.force || 'false' }}"
          if [ "$FORCE" = "true" ]; then
            echo "Force enabled; build tools are required"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ARGS="-b $S3_BUCKET -r $AWS_REGION --batch ${{ matrix.batch }} --batch-size 50 --platform ${{ matrix.platform.name }}"
          NEEDS_BUILD=$(bun scripts/build-all-packages.ts $ARGS --needs-build | tail -1)
          echo "needs_build=$NEEDS_BUILD" >> "$GITHUB_OUTPUT"
          if [ "$NEEDS_BUILD" = "false" ]; then
            echo "All selected source artifacts already exist in S3; skipping toolchain setup"
          fi

      - name: Free disk space (Linux)
        if: runner.os == 'Linux' && steps.source-preflight.outputs.needs_build != 'false'
        run: |
          # GitHub runners ship ~25-30GB of preinstalled SDKs we never use.
          # Large source builds (e.g. juju + its k8s/cloud deps) otherwise
          # exhaust the disk mid-build ("No space left on device").
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
            /usr/local/share/boost /usr/share/swift \
            /opt/hostedtoolcache/PyPy /opt/hostedtoolcache/Ruby \
            /usr/local/lib/node_modules /usr/share/miniconda \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell || true
          sudo docker image prune --all --force || true
          # Relocate heavy build trees to the large /mnt volume (~70GB) instead of
          # the ~20GB root volume; build-all-packages.ts honors BUILDKIT_ROOT.
          sudo mkdir -p /mnt/buildkit && sudo chown "$(id -u):$(id -g)" /mnt/buildkit
          echo "BUILDKIT_ROOT=/mnt/buildkit" >> "$GITHUB_ENV"
          df -h / /mnt

      - name: Install build tools (Linux)
        if: runner.os == 'Linux' && steps.source-preflight.outputs.needs_build != 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libreadline-dev zlib1g-dev libssl-dev \
            cmake meson ninja-build patchelf pkg-config \
            autoconf automake libtool gettext intltool \
            libffi-dev libexpat1-dev libbz2-dev liblzma-dev \
            libncurses5-dev libsqlite3-dev \
            python3-venv python3-pip python3-dev \
            libcurl4-openssl-dev libxml2-dev libonig-dev \
            ruby ruby-dev scons \
            gperf bison flex texinfo nasm yasm \
            libgmp-dev libmpfr-dev libmpc-dev \
            libuv1-dev libpcre2-dev libevent-dev \
            libglib2.0-dev libpixman-1-dev \
            libgit2-dev libssh2-1-dev libhttp-parser-dev \
            libasound2-dev libdbus-1-dev libsystemd-dev \
            protobuf-compiler libprotobuf-dev \
            nettle-dev libp11-kit-dev \
            libboost-all-dev libsndfile1-dev \
            libjpeg-dev libpng-dev libtiff-dev libwebp-dev \
            libfreetype-dev libharfbuzz-dev \
            libltdl-dev libacl1-dev libattr1-dev \
            liblz4-dev libzstd-dev libxxhash-dev \
            libyaml-dev libjansson-dev \
            libedit-dev libelf-dev \
            tcl-dev tk-dev \
            libunwind-dev libdw-dev \
            libzip-dev liblapack-dev gfortran \
            python3-lxml python3-libxml2 \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev \
            libxinerama-dev libxcomposite-dev libxdamage-dev \
            libxcursor-dev libxi-dev libxtst-dev \
            libxmu-dev libxt-dev libxaw7-dev libxres-dev \
            libsm-dev libice-dev libxpm-dev \
            libxxf86vm-dev libxshmfence-dev libxv-dev libxss-dev \
            x11proto-dev xtrans-dev xutils-dev xauth \
            libxkbcommon-dev libxkbfile-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-image0-dev libxcb-util-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-shm0-dev \
            libwayland-dev libfontconfig1-dev \
            gobject-introspection libgirepository1.0-dev \
            libatk1.0-dev libcairo2-dev libcairo-gobject2 \
            libpango1.0-dev libgtk-3-dev \
            librsvg2-dev libsecret-1-dev libjson-glib-dev \
            libsoup2.4-dev libgdk-pixbuf-2.0-dev \
            libva-dev libegl-dev libgbm-dev libdrm-dev \
            libgl-dev libglu1-mesa-dev \
            clang llvm-dev libclang-dev \
            libgnutls28-dev liblua5.4-dev \
            libcap-dev libcap-ng-dev libslirp-dev libssh-dev \
            libspeexdsp-dev libmaxminddb-dev libsmi2-dev \
            libc-ares-dev libre2-dev libpcap-dev \
            libnl-3-dev libnl-genl-3-dev \
            libpam0g-dev libudev-dev \
            libarchive-dev libusb-1.0-0-dev \
            libjemalloc-dev libvterm-dev \
            libxslt1-dev \
            libsdl2-dev libsdl2-gfx-dev libsdl2-mixer-dev libsdl2-image-dev \
            libsdl2-ttf-dev libsdl2-net-dev libplist-dev \
            libgc-dev \
            libpaper-dev \
            libimagequant-dev \
            libassuan-dev libgpg-error-dev \
            libfido2-dev \
            libdouble-conversion-dev libgoogle-glog-dev libgflags-dev \
            libsodium-dev liblzo2-dev libsnappy-dev libbrotli-dev \
            doxygen xsltproc docbook-xsl xmlto

      - name: Setup Xcode (macOS)
        if: runner.os == 'macOS' && steps.source-preflight.outputs.needs_build != 'false'
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
            echo "Selected Xcode: $XCODE_PATH"
          else
            echo "No Xcode 26.x found, using default"
          fi
          swift --version
          xcodebuild -version

      - name: Cache Homebrew packages
        if: runner.os == 'macOS' && steps.source-preflight.outputs.needs_build != 'false'
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
            /opt/homebrew/opt
            /opt/homebrew/lib
            /opt/homebrew/include
          key: brew-build-tools-${{ runner.os }}-v2
          restore-keys: |
            brew-build-tools-${{ runner.os }}-

      - name: Install build tools (macOS)
        if: runner.os == 'macOS' && steps.source-preflight.outputs.needs_build != 'false'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew install cmake meson ninja pkg-config autoconf automake libtool gettext gnu-sed scons \
            gcc go boost libsndfile jpeg-turbo libpng libtiff webp freetype harfbuzz \
            libyaml jansson libedit libzip lapack nasm libogg libvorbis flac \
            gobject-introspection cairo pango atk gtk+3 glib gdk-pixbuf librsvg json-glib libsoup \
            gnutls libgcrypt libgpg-error libassuan libksba libusb pcre2 \
            libarchive jemalloc lua protobuf grpc c-ares re2 capnp \
            libsecret libfido2 double-conversion glog gflags \
            libsodium lzo snappy brotli \
            doxygen docbook-xsl sdl2 sdl2_ttf sdl2_mixer sdl2_gfx || true
          # Keep Homebrew cmake (4.x) — pip cmake 3.x crashes with Abort trap: 6 on ARM64.
          # Any packages needing cmake <4 should use S3 cmake.org dep or package-overrides.

      - name: Fix Python setuptools (Linux)
        if: runner.os == 'Linux' && steps.source-preflight.outputs.needs_build != 'false'
        run: |
          # Remove Debian-patched setuptools/wheel from shared dist-packages.
          # These contain install_layout which breaks standard wheel builds with:
          #   AttributeError: install_layout. Did you mean: 'install_platlib'?
          # Our S3 Python sees /usr/lib/python3/dist-packages/ and imports the
          # broken versions. Replacing with standard PyPI versions fixes this.
          # The Debian-patched wheel at /usr/lib/python3/dist-packages/ has install_layout
          # which causes "AttributeError: install_layout" when building wheels.
          # pip install --upgrade installs to a LOWER priority path, so we must actually
          # remove the Debian-patched files and replace them with standard PyPI versions.
          sudo rm -rf /usr/lib/python3/dist-packages/setuptools* \
                      /usr/lib/python3/dist-packages/wheel* \
                      /usr/lib/python3/dist-packages/pkg_resources* \
                      /usr/lib/python3/dist-packages/_distutils_hack* 2>/dev/null || true
          sudo pip3 install --break-system-packages setuptools wheel 2>/dev/null || true

      - name: Setup Rust toolchain
        if: steps.source-preflight.outputs.needs_build != 'false'
        run: |
          # Always update to latest stable Rust (runners may have old pre-installed versions)
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source "$HOME/.cargo/env"
          rustup update stable
          cargo install cargo-c 2>/dev/null || true
          echo "Rust: $(rustc --version), Cargo: $(cargo --version)"
          # Persist cargo PATH for subsequent steps (GitHub Actions doesn't source .profile)
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          # Ensure pip packages needed for building are available
          python3 -m pip install --break-system-packages setuptools meson 2>/dev/null || pip3 install --break-system-packages setuptools meson 2>/dev/null || true

      - name: Verify toolchains
        if: steps.source-preflight.outputs.needs_build != 'false'
        run: |
          echo "=== Toolchain versions ==="
          cargo --version 2>/dev/null || echo "cargo: not found"
          rustc --version 2>/dev/null || echo "rustc: not found"
          go version 2>/dev/null || echo "go: not found"
          python3 --version 2>/dev/null || echo "python3: not found"
          node --version 2>/dev/null || echo "node: not found"
          java -version 2>/dev/null || echo "java: not found"
          echo "HOME=$HOME"
          echo "CARGO_HOME=${CARGO_HOME:-not set}"
          echo "GOPATH=${GOPATH:-not set}"
          echo "JAVA_HOME=${JAVA_HOME:-not set}"
          which cargo 2>/dev/null || echo "cargo not in PATH"
          which go 2>/dev/null || echo "go not in PATH"
          which java 2>/dev/null || echo "java not in PATH"

      - name: Build batch ${{ matrix.batch }}
        if: steps.source-preflight.outputs.needs_build != 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/ts-pantry

          FORCE="${{ github.event.inputs.force || 'false' }}"
          ARGS="-b $S3_BUCKET -r $AWS_REGION --batch ${{ matrix.batch }} --batch-size 50 --platform ${{ matrix.platform.name }}"

          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "Running: bun scripts/build-all-packages.ts $ARGS"
          bun scripts/build-all-packages.ts $ARGS
        timeout-minutes: 110

  notify:
    name: discord-failure-alert
    needs: [sync-prebuilt, verify-metadata, build-targeted, build]
    if: always() && (needs.sync-prebuilt.result == 'failure' || needs.verify-metadata.result == 'failure' || needs.build-targeted.result == 'failure' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build fields
        id: fields
        run: |
          # Only include jobs that actually ran (not skipped)
          FIELDS="["
          FIRST=true
          for pair in "Sync Pre-built:${{ needs.sync-prebuilt.result }}" "Verify Metadata:${{ needs.verify-metadata.result }}" "Build Targeted:${{ needs.build-targeted.result }}" "Build Batches:${{ needs.build.result }}"; do
            NAME="${pair%%:*}"
            VAL="${pair##*:}"
            [ "$VAL" = "skipped" ] && continue
            [ "$FIRST" = "true" ] && FIRST=false || FIELDS="$FIELDS,"
            FIELDS="$FIELDS{\"name\":\"$NAME\",\"value\":\"$VAL\",\"inline\":true}"
          done
          FIELDS="$FIELDS]"
          echo "json=$FIELDS" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/discord-notify
        with:
          title: Sync Binaries — Failed
          description: One or more sync/build jobs failed
          status: failure
          fields: ${{ steps.fields.outputs.json }}
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
