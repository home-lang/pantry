name: Sync Zig Versions

on:
  schedule:
    # Check for new zig versions every 6 hours
    - cron: '30 */6 * * *'
  workflow_dispatch:
    inputs:
      include-dev:
        description: 'Include latest dev/master version'
        required: false
        type: boolean
        default: true
      force:
        description: 'Force re-upload even if already in S3'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  S3_BUCKET: pantry-registry

jobs:
  build:
    name: Build zig (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-15
            name: darwin-arm64
          - os: ubuntu-latest
            name: linux-x86-64
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: read
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2565+684032671

      - name: Install dependencies
        run: bun install

      - name: Build all zig versions
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INCLUDE_DEV: ${{ github.event.inputs.include-dev || 'true' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          cd packages/ts-pantry

          # Fetch all available versions from ziglang.org
          ZIG_INDEX=$(curl -s https://ziglang.org/download/index.json)

          # Get stable versions (latest 10)
          STABLE_VERSIONS=$(echo "$ZIG_INDEX" | jq -r 'keys[] | select(test("^[0-9]"))' | sort -V -r | head -10)

          # Get dev version
          DEV_VERSION=""
          if [ "$INCLUDE_DEV" = "true" ]; then
            DEV_VERSION=$(echo "$ZIG_INDEX" | jq -r '.master.version // empty')
            echo "Latest dev version: $DEV_VERSION"
          fi

          # Build each version using build-package.ts directly
          for ver in $DEV_VERSION $STABLE_VERSIONS; do
            [ -z "$ver" ] && continue

            echo ""
            echo "=========================================="
            echo "Building ziglang.org@${ver} for ${{ matrix.platform.name }}"
            echo "=========================================="

            BUILD_DIR="/tmp/buildkit-build-ziglang.org"
            PREFIX="/tmp/buildkit-install-ziglang.org"
            DEPS_DIR="/tmp/buildkit-deps"

            # Clean up from previous build
            rm -rf "$BUILD_DIR" "$PREFIX"
            mkdir -p "$BUILD_DIR" "$PREFIX" "$DEPS_DIR"

            bun scripts/build-package.ts \
              -p ziglang.org \
              -v "$ver" \
              --platform ${{ matrix.platform.name }} \
              --build-dir "$BUILD_DIR" \
              --prefix "$PREFIX" \
              --deps-dir "$DEPS_DIR" \
              -b $S3_BUCKET \
              -r $AWS_REGION || echo "⚠️ Failed to build ziglang.org@${ver}, continuing..."
          done
        timeout-minutes: 50

  notify:
    name: Discord notification
    needs: build
    if: always() && needs.build.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        with:
          title: "Sync Zig — Failed"
          description: "Failed to sync zig versions"
          status: failure
          fields: |
            [
              {"name": "Include Dev", "value": "${{ github.event.inputs.include-dev || 'true' }}", "inline": true},
              {"name": "Force", "value": "${{ github.event.inputs.force || 'false' }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
