name: Sync Zig Dev

# Daily dispatch of build-versions.yml targeted at ziglang.org so the latest
# 0.16-dev master build from ziglang.org/download/index.json lands in S3
# within ~24h of upstream publishing it, instead of waiting for the weekly
# multi-version run.

on:
  schedule:
    # Daily at 5am UTC — upstream typically cuts new dev builds overnight.
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: sync-zig-dev
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger:
    name: Dispatch build-versions for ziglang.org
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Trigger build-versions.yml
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build-versions.yml \
            -R ${{ github.repository }} \
            -f packages=ziglang.org \
            -f max-versions=5 \
            -f force=false
