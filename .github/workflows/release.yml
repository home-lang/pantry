name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pantry:
    name: pantry
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Setup Zig (pinned 0.17-dev)
        uses: mlugg/setup-zig@v2
        with:
          version: '0.17.0-dev.56+a8226cd53'

      - name: Ensure zig deps are present
        run: |
          # pantry install may skip registry-hosted zig-cli / zig-config /
          # zig-test-framework; clone sources directly as a reliable fallback
          # so the build always has dependency sources on disk.
          mkdir -p pantry
          for repo in zig-cli zig-config zig-test-framework; do
            if [ ! -f "pantry/$repo/src/root.zig" ] && [ ! -f "pantry/$repo/src/lib.zig" ] && [ ! -f "pantry/$repo/src/zig-config.zig" ]; then
              echo "Cloning $repo ..."
              rm -rf "pantry/$repo"
              git clone --depth 1 "https://github.com/zig-utils/$repo.git" "pantry/$repo"
            else
              echo "$repo already present"
            fi
          done

      - name: Fix zig deps compat
        run: |
          # Patches external zig-cli / zig-config sources for zig-0.17-dev API drift.
          # Upstream hasn't migrated yet; we rewrite on each CI run until they do.
          find pantry/zig-cli/src pantry/zig-config/src -name '*.zig' 2>/dev/null | while read f; do
            # ArrayList empty init
            perl -pi -e 's/std\.ArrayList\(([^)]*)\)\{\}/std.ArrayList($1){ .items = \&.{}, .capacity = 0 }/g' "$f"
          done
          # ObjectMap became unmanaged in 0.17-dev. zig-config has one site; patch it precisely.
          UTILS="pantry/zig-config/src/utils.zig"
          if [ -f "$UTILS" ]; then
            perl -0777 -pi -e 's/var new_obj = std\.json\.ObjectMap\.init\(allocator\);\n(\s+)var iter = obj\.iterator\(\);\n(\s+)while \(iter\.next\(\)\) \|entry\| \{\n(\s+)try new_obj\.put\(\n(\s+)try allocator\.dupe/var new_obj: std.json.ObjectMap = .empty;\n$1var iter = obj.iterator();\n$2while (iter.next()) |entry| {\n$3try new_obj.put(\n$4allocator,\n$4try allocator.dupe/' "$UTILS"
          fi

      - name: Build for All Platforms
        run: |
          set -e
          cd packages/zig
          zig build compile-all

      - name: Package Binaries
        run: |
          mkdir -p dist
          echo "Built binaries:"
          ls -la packages/zig/zig-out/bin/

          # Verify critical targets exist before packaging
          MISSING=0
          for required in linux-x86_64 macos-aarch64; do
            if [ ! -d "packages/zig/zig-out/bin/$required" ]; then
              echo "::error::Required target $required not found"
              MISSING=1
            fi
          done
          if [ "$MISSING" = "1" ]; then
            exit 1
          fi

          for target in linux-x86_64 linux-aarch64 macos-x86_64 macos-aarch64 windows-x86_64 freebsd-x86_64 freebsd-aarch64; do
            dir="packages/zig/zig-out/bin/$target"
            if [ ! -d "$dir" ]; then
              echo "::warning::Optional target $target not found"
              continue
            fi

            case "$target" in
              linux-x86_64)   name="pantry-linux-x64.zip" ; bin="pantry" ;;
              linux-aarch64)  name="pantry-linux-arm64.zip" ; bin="pantry" ;;
              macos-x86_64)   name="pantry-darwin-x64.zip" ; bin="pantry" ;;
              macos-aarch64)  name="pantry-darwin-arm64.zip" ; bin="pantry" ;;
              windows-x86_64)  name="pantry-windows-x64.zip" ; bin="pantry.exe" ;;
              freebsd-x86_64)  name="pantry-freebsd-x64.zip" ; bin="pantry" ;;
              freebsd-aarch64) name="pantry-freebsd-arm64.zip" ; bin="pantry" ;;
            esac

            echo "Packaging $target -> $name"
            (cd "$dir" && zip -r "../../../../../dist/$name" "$bin")
          done

          echo "Packaged files:"
          ls -la dist/

      - name: Create GitHub Release
        uses: ./packages/action
        with:
          install: 'false'
          release: 'true'
          release-files: |
            dist/pantry-linux-x64.zip
            dist/pantry-linux-arm64.zip
            dist/pantry-darwin-x64.zip
            dist/pantry-darwin-arm64.zip
            dist/pantry-windows-x64.zip
            dist/pantry-freebsd-x64.zip
            dist/pantry-freebsd-arm64.zip
          release-changelog: CHANGELOG.md
          release-token: ${{ secrets.GITHUB_TOKEN }}

  npm:
    name: npm
    needs: pantry
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install Dependencies
        run: bun install

      - name: Publish
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    name: discord-notification
    needs: [pantry, npm]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        with:
          title: "Release ${{ github.ref_name }} — ${{ needs.pantry.result == 'success' && needs.npm.result == 'success' && 'Published' || (needs.pantry.result == 'cancelled' || needs.npm.result == 'cancelled') && 'Cancelled' || 'Failed' }}"
          description: "pantry ${{ github.ref_name }} has been released"
          status: ${{ needs.pantry.result == 'success' && needs.npm.result == 'success' && 'success' || (needs.pantry.result == 'cancelled' || needs.npm.result == 'cancelled') && 'warning' || 'failure' }}
          fields: |
            [
              {"name": "Tag", "value": "`${{ github.ref_name }}`", "inline": true},
              {"name": "Actor", "value": "${{ github.actor }}", "inline": true},
              {"name": "CLI Binary", "value": "${{ needs.pantry.result == 'success' && '✅ Published' || '❌ Failed' }}", "inline": true},
              {"name": "npm Packages", "value": "${{ needs.npm.result == 'success' && '✅ Published' || '❌ Failed' }}", "inline": true},
              {"name": "Release", "value": "[View on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
