name: Build Desktop Apps

on:
  schedule:
    # Sync desktop apps daily at 6am UTC
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      packages:
        description: 'Desktop app domains to build (comma or space separated, or "all")'
        required: false
        type: string
        default: all
      force:
        description: 'Force re-upload even if already in S3'
        required: false
        type: boolean
        default: true

env:
  AWS_REGION: us-east-1
  S3_BUCKET: pantry-registry
  # All desktop app domains for the "all" input
  ALL_DESKTOP_APPS: >-
    code.visualstudio.com,discord.com,slack.com,obsidian.md,
    notion.so,spotify.com,figma.com,1password.com,
    iterm2.com,firefox.org,brave.com,arc.net,
    raycast.com,linear.app,warp.dev,ghostty.org,
    cursor.com,zed.dev,docker.com/desktop,tableplus.com,
    postman.com,vlc.app,handbrake.fr,rectangle.app,
    karabiner-elements.pqrs.org,cleanshot.com,alttab.app,
    stats.app,maccy.app,orbstack.dev,
    signal.org,telegram.org,whatsapp.com,ollama.com,
    lmstudio.ai,dbeaver.io,iina.io,keka.io,
    keepassxc.org,element.io,inkscape.org,gimp.org,
    blender.org,libreoffice.org,bruno.app,tunnelblick.net,
    meetingbar.app,hiddenbar.app,monitorcontrol.app,
    github.com/desktop,imageoptim.com,insomnia.rest,
    logitech.com/options,the-unarchiver.com,transmit.panic.com

jobs:
  build:
    name: Build desktop apps (darwin-arm64)
    runs-on: macos-15
    permissions:
      contents: read
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: bun install

      - name: Build desktop apps
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/ts-pantry

          FORCE="${{ github.event.inputs.force || 'true' }}"
          ARGS="-b $S3_BUCKET -r $AWS_REGION --platform darwin-arm64"

          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          # Resolve packages
          PACKAGES="${{ github.event.inputs.packages || 'all' }}"
          if [ "$PACKAGES" = "all" ]; then
            PACKAGES="$ALL_DESKTOP_APPS"
          fi
          PACKAGES="${PACKAGES// /,}"
          ARGS="$ARGS -p $PACKAGES"

          echo "Running: bun scripts/build-all-packages.ts $ARGS"
          bun scripts/build-all-packages.ts $ARGS
        timeout-minutes: 110

  notify:
    name: discord-notification
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        with:
          title: "Desktop Apps Build — ${{ needs.build.result == 'success' && 'Success' || needs.build.result == 'cancelled' && 'Cancelled' || 'Failed' }}"
          description: "Desktop app packages: ${{ github.event.inputs.packages || 'all' }}"
          status: ${{ needs.build.result == 'success' && 'success' || needs.build.result == 'cancelled' && 'warning' || 'failure' }}
          fields: |
            [
              {"name": "Force", "value": "${{ github.event.inputs.force || 'true' }}", "inline": true},
              {"name": "Actor", "value": "${{ github.actor }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
