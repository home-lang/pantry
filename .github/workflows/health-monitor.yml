name: Health Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check registry health
        id: registry
        run: |
          # Use a temp file to isolate the HTTP code from error output
          HTTP_CODE=$(curl -sS -o /tmp/health-response -w '%{http_code}' \
            --max-time 15 \
            'https://registry.pantry.dev/health' 2>/dev/null) || true
          # Extract only the last 3 chars (the HTTP code) in case of any prefix noise
          HTTP_CODE="${HTTP_CODE: -3}"
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=healthy" >> "$GITHUB_OUTPUT"
          else
            echo "status=unhealthy" >> "$GITHUB_OUTPUT"
          fi

      - name: Check S3 bucket accessibility
        id: s3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          if aws s3api head-bucket --bucket pantry-registry 2>/dev/null; then
            echo "status=accessible" >> "$GITHUB_OUTPUT"
          else
            echo "status=inaccessible" >> "$GITHUB_OUTPUT"
          fi

      - name: Check recent workflow failures
        id: failures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TWO_HOURS_AGO=$(date -u -d '2 hours ago' '+%Y-%m-%dT%H:%M:%SZ')

          # Count failures excluding health-monitor itself to avoid self-referential counting
          # Use 2h window: workflows run every 20min, so 2h captures 6 runs per workflow
          FAIL_COUNT=$(gh api \
            "repos/${{ github.repository }}/actions/runs?status=failure&created=>=$TWO_HOURS_AGO&per_page=100" \
            --jq '[.workflow_runs[] | select(.name != "Health Monitor")] | length' 2>/dev/null || echo "0")

          echo "count=$FAIL_COUNT" >> "$GITHUB_OUTPUT"
          # 2 workflows x 6 runs/2h = 12 total runs. Alert if >10 fail (sustained breakage)
          if [ "$FAIL_COUNT" -gt 10 ]; then
            echo "status=elevated" >> "$GITHUB_OUTPUT"
          else
            echo "status=normal" >> "$GITHUB_OUTPUT"
          fi

      - name: Check stale syncs
        id: stale
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE_ITEMS=""
          NOW=$(date -u +%s)

          # Check update-pantry — should run every 20min
          # But only alert if there are NO runs at all (not even failures) in the last 2h.
          # If the workflow is running but failing, the failure check handles it.
          LAST_PANTRY=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/update-pantry.yml/runs?per_page=1" \
            --jq '.workflow_runs[0].updated_at // empty' 2>/dev/null || echo "")
          if [ -n "$LAST_PANTRY" ] && [ "$LAST_PANTRY" != "null" ]; then
            PANTRY_TS=$(date -u -d "$LAST_PANTRY" +%s 2>/dev/null || echo "")
            if [ -n "$PANTRY_TS" ] && [ "$PANTRY_TS" -gt 0 ] 2>/dev/null; then
              PANTRY_AGE=$(( (NOW - PANTRY_TS) / 3600 ))
              if [ "$PANTRY_AGE" -gt 2 ]; then
                STALE_ITEMS="update-pantry (${PANTRY_AGE}h ago)"
              fi
            fi
          fi

          # Check sync-binaries — runs every 6h, alert if >12h stale (any run, not just success)
          LAST_SYNC=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/sync-binaries.yml/runs?per_page=1" \
            --jq '.workflow_runs[0].updated_at // empty' 2>/dev/null || echo "")
          if [ -n "$LAST_SYNC" ] && [ "$LAST_SYNC" != "null" ]; then
            SYNC_TS=$(date -u -d "$LAST_SYNC" +%s 2>/dev/null || echo "")
            if [ -n "$SYNC_TS" ] && [ "$SYNC_TS" -gt 0 ] 2>/dev/null; then
              SYNC_AGE=$(( (NOW - SYNC_TS) / 3600 ))
              if [ "$SYNC_AGE" -gt 12 ]; then
                if [ -n "$STALE_ITEMS" ]; then
                  STALE_ITEMS="$STALE_ITEMS, sync-binaries (${SYNC_AGE}h ago)"
                else
                  STALE_ITEMS="sync-binaries (${SYNC_AGE}h ago)"
                fi
              fi
            fi
          fi

          if [ -n "$STALE_ITEMS" ]; then
            echo "status=stale" >> "$GITHUB_OUTPUT"
            echo "items=$STALE_ITEMS" >> "$GITHUB_OUTPUT"
          else
            echo "status=fresh" >> "$GITHUB_OUTPUT"
            echo "items=" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine overall health
        id: overall
        run: |
          ISSUES=""
          if [ "${{ steps.registry.outputs.status }}" != "healthy" ]; then
            ISSUES="Registry unhealthy (HTTP ${{ steps.registry.outputs.http_code }})"
          fi
          if [ "${{ steps.s3.outputs.status }}" != "accessible" ]; then
            [ -n "$ISSUES" ] && ISSUES="$ISSUES; "
            ISSUES="${ISSUES}S3 bucket inaccessible"
          fi
          if [ "${{ steps.failures.outputs.status }}" = "elevated" ]; then
            [ -n "$ISSUES" ] && ISSUES="$ISSUES; "
            ISSUES="${ISSUES}${{ steps.failures.outputs.count }} workflow failures in last 2h"
          fi
          if [ "${{ steps.stale.outputs.status }}" = "stale" ]; then
            [ -n "$ISSUES" ] && ISSUES="$ISSUES; "
            ISSUES="${ISSUES}Stale: ${{ steps.stale.outputs.items }}"
          fi

          if [ -n "$ISSUES" ]; then
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Rate-limit failure alerts
        id: ratelimit
        if: steps.overall.outputs.healthy == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only send unhealthy alerts at most once per 2 hours to avoid alert fatigue.
          # Check if we already sent an alert recently by looking at recent health-monitor
          # runs that were successful (meaning they completed, including the alert step).
          # We use a simple heuristic: check the run annotations/titles for "Health Alert"
          # by looking at the last few runs' timing.
          ONE_HOUR_AGO=$(date -u -d '2 hours ago' '+%Y-%m-%dT%H:%M:%SZ')

          # Count recent health monitor runs - if this is the first failure after a healthy
          # period, always send. Otherwise, only send every 2h.
          RECENT_HEALTHY=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/health-monitor.yml/runs?created=>=$ONE_HOUR_AGO&per_page=10" \
            --jq '[.workflow_runs[1:] | .[] | select(.conclusion == "success")] | length' 2>/dev/null || echo "0")

          # If there was a healthy run in the last 2h, this is a new incident — always alert
          if [ "$RECENT_HEALTHY" -gt 0 ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
            echo "New incident detected (was healthy recently), sending alert"
          else
            # Ongoing incident — only alert on the hour mark (minute 0-29 of even hours)
            HOUR=$(date -u +%-H)
            MIN=$(date -u +%-M)
            if [ "$MIN" -lt 30 ] && [ $((HOUR % 2)) -eq 0 ]; then
              echo "send=true" >> "$GITHUB_OUTPUT"
              echo "Ongoing incident, sending periodic alert"
            else
              echo "send=false" >> "$GITHUB_OUTPUT"
              echo "Ongoing incident, suppressing duplicate alert (last alert was recent)"
            fi
          fi

      - name: Send failure alert
        if: steps.overall.outputs.healthy == 'false' && steps.ratelimit.outputs.send == 'true'
        uses: ./.github/actions/discord-notify
        with:
          title: Pantry Health Alert
          description: Infrastructure issues detected
          status: failure
          fields: |
            [
              {"name": "Registry", "value": "${{ steps.registry.outputs.status || 'unknown' }} (HTTP ${{ steps.registry.outputs.http_code || '?' }})", "inline": true},
              {"name": "S3 Bucket", "value": "${{ steps.s3.outputs.status || 'unknown' }}", "inline": true},
              {"name": "Failures (2h)", "value": "${{ steps.failures.outputs.count || '?' }}", "inline": true},
              {"name": "Stale Syncs", "value": "${{ steps.stale.outputs.items || 'none' }}", "inline": false}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Check if all-clear window
        if: steps.overall.outputs.healthy == 'true'
        id: allclear
        run: |
          HOUR=$(date -u +%-H)
          MIN=$(date -u +%-M)
          # Send all-clear at 00:00, 06:00, 12:00, 18:00 UTC (within first 30min window)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             ([ "$MIN" -lt 30 ] && ([ "$HOUR" = "0" ] || [ "$HOUR" = "6" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "18" ])); then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send all-clear (4x daily)
        if: steps.allclear.outputs.send == 'true'
        uses: ./.github/actions/discord-notify
        with:
          title: Pantry Health — All Clear
          description: All systems operating normally
          status: success
          fields: |
            [
              {"name": "Registry", "value": "${{ steps.registry.outputs.status || 'unknown' }}", "inline": true},
              {"name": "S3 Bucket", "value": "${{ steps.s3.outputs.status || 'unknown' }}", "inline": true},
              {"name": "Failures (2h)", "value": "${{ steps.failures.outputs.count || '0' }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
