name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install Zig
        run: |
          cp package.json package.json.bak
          pantry install ziglang.org
          mv package.json.bak package.json
          echo "${{ github.workspace }}/pantry/.bin" >> $GITHUB_PATH

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: $HOME/.bun/bin/bun install

      - name: Lint TypeScript/JavaScript
        run: bun run lint

      - name: Format Check Zig Code
        run: |
          find packages/zig/src -name "*.zig" -not -name "generated.zig" -type f -exec zig fmt --check {} +

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: $HOME/.bun/bin/bun install

      - name: Typecheck
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install Zig
        run: |
          cp package.json package.json.bak
          pantry install ziglang.org
          mv package.json.bak package.json
          echo "${{ github.workspace }}/pantry/.bin" >> $GITHUB_PATH

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: $HOME/.bun/bin/bun install

      - name: Build TypeScript packages
        run: bun run build

      - name: Build pantry GitHub Action
        run: cd packages/action && bun run build

      - name: Unit Test
        run: bun test

      - name: Bootstrap Zig Dependencies
        run: |
          mkdir -p pantry
          cd pantry
          [ -d zig-cli ] || git clone --depth 1 https://github.com/zig-utils/zig-cli.git
          [ -d zig-config ] || git clone --depth 1 https://github.com/zig-utils/zig-config.git
          [ -d zig-test-framework ] || git clone --depth 1 https://github.com/zig-utils/zig-test-framework.git

      - name: Zig Tests
        run: |
          cd packages/zig
          echo "Running Zig unit tests..."
          zig test src/core/string.zig -lc
          zig test src/core/path.zig -lc
          echo "Zig unit tests passed."

          echo "Building pantry..."
          zig build

  continuous-release:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: $HOME/.bun/bin/bun install

      - name: Build TypeScript packages
        run: bun run build

      - name: Configure AWS credentials
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOC
          [default]
          aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOC
          cat > ~/.aws/config << EOC
          [default]
          region = us-east-1
          EOC

      - name: Continuous Releases
        run: pantry publish:commit './packages/*'

  notify:
    name: discord-failure-alert
    needs: [lint, typecheck, test, continuous-release]
    if: always() && (needs.lint.result == 'failure' || needs.typecheck.result == 'failure' || needs.test.result == 'failure' || needs.continuous-release.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        with:
          title: "CI — Failed"
          description: "CI pipeline failure on ${{ github.ref_name }}"
          status: failure
          fields: |
            [
              {"name": "Lint", "value": "${{ needs.lint.result }}", "inline": true},
              {"name": "Typecheck", "value": "${{ needs.typecheck.result }}", "inline": true},
              {"name": "Test", "value": "${{ needs.test.result }}", "inline": true},
              {"name": "Release", "value": "${{ needs.continuous-release.result }}", "inline": true},
              {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
              {"name": "Author", "value": "${{ github.actor }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
