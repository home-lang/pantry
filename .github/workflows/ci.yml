name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

# Default to least-privilege GITHUB_TOKEN; jobs that need more elevate explicitly.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install Dependencies
        run: bun install

      - name: Lint TypeScript/JavaScript
        run: bun run lint

      - name: Format Check Zig Code
        run: |
          if command -v zig &>/dev/null; then
            find packages/zig/src -name "*.zig" -not -name "generated.zig" -type f -exec zig fmt --check {} +
          else
            echo "Zig not available — skipping format check"
          fi

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install Dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install Dependencies
        run: bun install

      - name: Build TypeScript packages
        run: bun run build

      - name: Build pantry GitHub Action
        run: cd packages/action && bun run build

      - name: Unit Test
        run: bun test

      - name: Zig Tests
        run: |
          if ! command -v zig &>/dev/null; then
            echo "::warning::Zig not available — skipping Zig tests"
            exit 0
          fi
          cd packages/zig
          echo "Running Zig unit tests..."
          zig test src/core/string.zig -lc
          zig test src/core/path.zig -lc
          echo "Zig unit tests passed."

          echo "Building pantry..."
          zig build || echo "Zig build failed (non-fatal in CI — full build requires all deps)"

  # continuous-release disabled until AWS creds are rotated / a new pantry
  # binary with the S3->HTTP fallback is released. Re-enable once the
  # commit-preview publisher is reliably working again.
  # continuous-release:
  #   needs: [lint, typecheck, test]
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 15
  #   continue-on-error: true
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Setup Pantry
  #       uses: ./packages/action
  #     - name: Install Dependencies
  #       run: bun install
  #     - name: Build TypeScript packages
  #       run: bun run build
  #     - name: Continuous Releases
  #       env:
  #         AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  #         AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  #         AWS_DEFAULT_REGION: us-east-1
  #         PANTRY_REGISTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}
  #         PANTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}
  #       run: |
  #         if [ -f bun.lock ] && ! git diff --quiet bun.lock; then
  #           git checkout -- bun.lock
  #         fi
  #         pantry publish:commit './packages/*'

  notify:
    name: discord-failure-alert
    needs: [lint, typecheck, test]
    # continuous-release is best-effort; only alert on gating job failures.
    if: always() && (needs.lint.result == 'failure' || needs.typecheck.result == 'failure' || needs.test.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        with:
          title: "CI — Failed"
          description: "CI pipeline failure on ${{ github.ref_name }}"
          status: failure
          fields: |
            [
              {"name": "Lint", "value": "${{ needs.lint.result }}", "inline": true},
              {"name": "Typecheck", "value": "${{ needs.typecheck.result }}", "inline": true},
              {"name": "Test", "value": "${{ needs.test.result }}", "inline": true},
              {"name": "Release", "value": "${{ needs.continuous-release.result }}", "inline": true},
              {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
              {"name": "Author", "value": "${{ github.actor }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
