name: Registry Integrity

on:
  schedule:
    # Nightly consistency pass over binary registry metadata.
    - cron: '37 9 * * *'
  workflow_dispatch:

concurrency:
  group: registry-integrity
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  S3_BUCKET: pantry-registry

permissions:
  contents: read

jobs:
  binary-metadata:
    name: Binary metadata integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install dependencies
        run: bun install

      - name: Verify and repair binary registry metadata
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd packages/ts-pantry
          bun scripts/verify-binary-metadata.ts \
            -b "$S3_BUCKET" \
            -r "$AWS_REGION" \
            --all-binary-sync \
            --repair \
            --delete-strays \
            --require-configured-platforms

  notify:
    name: discord-failure-alert
    needs: binary-metadata
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        with:
          title: Registry Integrity — Failed
          description: Binary registry metadata integrity check failed
          status: failure
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
