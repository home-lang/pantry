name: Registry Integrity

on:
  schedule:
    # Nightly consistency pass over binary registry metadata.
    - cron: '37 9 * * *'
  workflow_dispatch:

concurrency:
  group: registry-integrity
  cancel-in-progress: false

env:
  # Object storage provider. Set the repo variable STORAGE_PROVIDER=hetzner (or
  # backblaze) plus the S3_* vars and the S3_ACCESS_KEY_ID/S3_SECRET_ACCESS_KEY
  # secrets below to verify binaries there. Defaults to AWS S3 (unchanged).
  STORAGE_PROVIDER: ${{ vars.STORAGE_PROVIDER || 'aws' }}
  S3_BUCKET: ${{ vars.S3_BUCKET || 'pantry-registry' }}
  S3_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
  S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
  AWS_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
  # Provider-agnostic S3-compatible credentials (Hetzner Object Storage,
  # Backblaze B2, etc.). Used for any non-AWS provider; unset ⇒ AWS path unaffected.
  S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
  S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

permissions:
  contents: read

jobs:
  binary-metadata:
    name: Binary metadata integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action

      - name: Install dependencies
        run: bun install

      - name: Verify and repair binary registry metadata
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd packages/ts-pantry
          bun scripts/verify-binary-metadata.ts \
            -b "$S3_BUCKET" \
            -r "$AWS_REGION" \
            --all-binary-sync \
            --repair \
            --delete-strays \
            --require-configured-platforms

  notify:
    name: discord-failure-alert
    needs: binary-metadata
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        with:
          title: Registry Integrity — Failed
          description: Binary registry metadata integrity check failed
          status: failure
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
