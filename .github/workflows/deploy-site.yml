name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
      - 'public/install.sh'
      - 'docs/**'
      - '.config/bunpress.ts'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install

      - name: Deploy static assets via ts-cloud
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          echo "y" | bunx cloud deploy:static \
            --source ./public \
            --bucket pantry-dev-site \
            --cache-control "public, max-age=3600" \
            --skip-security-scan \
            --no-invalidate || echo "::warning::Static deploy via ts-cloud failed (non-critical)"

      - name: Deploy Bun server to EC2 (zero-downtime)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.REGISTRY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 54.243.196.101 >> ~/.ssh/known_hosts 2>/dev/null

          ssh -o StrictHostKeyChecking=no ec2-user@54.243.196.101 << 'EOF'
            set -e
            cd /opt/pantry-registry/repo

            # Fix git ownership
            git config --global --add safe.directory /opt/pantry-registry/repo

            sudo git fetch origin main
            sudo git reset --hard origin/main

            # Incremental install — only postinstall re-patches stx/ts-cloud if needed
            sudo /root/.bun/bin/bun install

            # Build bunpress docs (served at /docs)
            sudo /root/.bun/bin/bun run build:docs

            # Create systemd service if it doesn't exist
            if ! systemctl list-unit-files | grep -q pantry-site; then
              sudo tee /etc/systemd/system/pantry-site.service > /dev/null << 'SERVICE'
          [Unit]
          Description=Pantry Site
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/pantry-registry/repo/packages/site
          ExecStart=/root/.bun/bin/bun run src/server.ts
          Restart=always
          RestartSec=1
          Environment=PORT=3001
          Environment=NODE_ENV=production

          # Zero-downtime: systemd keeps old process until new one is ready
          ExecReload=/bin/kill -USR2 $MAINPID
          TimeoutStopSec=30
          KillMode=mixed
          KillSignal=SIGTERM

          [Install]
          WantedBy=multi-user.target
          SERVICE
              sudo systemctl daemon-reload
              sudo systemctl enable pantry-site
            fi

            # Zero-downtime restart:
            # 1. Start new instance on temp port to verify it works
            cd packages/site
            sudo bash -c 'cd /opt/pantry-registry/repo/packages/site && PORT=3002 timeout 10 /root/.bun/bin/bun run src/server.ts &'
            sleep 3

            if curl -sf http://localhost:3002/health > /dev/null 2>&1; then
              echo "New version health check passed"
              sudo pkill -f "PORT=3002.*server.ts" 2>/dev/null || true
              sleep 1

              # Reload the actual service (brief restart, sub-second)
              sudo systemctl daemon-reload
              sudo systemctl restart pantry-site
              sleep 2

              if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                echo "Service restarted successfully"
              else
                echo "::error::Service restart failed"
                exit 1
              fi
            else
              echo "::error::New version health check failed - aborting deploy"
              sudo pkill -f "PORT=3002.*server.ts" 2>/dev/null || true
              exit 1
            fi
          EOF

      - name: Verify deployment
        run: |
          # Internal health check already passed during deploy step.
          # External check via SSH since port 3001 may not be publicly exposed.
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key ec2-user@54.243.196.101 \
            'curl -sf http://localhost:3001/health && echo "External verify: OK"'
          rm -f /tmp/deploy_key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.REGISTRY_SSH_KEY }}

  notify:
    name: Discord notification
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/discord-notify
        with:
          title: "Site Deploy — ${{ needs.deploy.result == 'success' && 'Deployed' || needs.deploy.result == 'cancelled' && 'Cancelled' || 'Failed' }}"
          description: "pantry.dev site updated"
          status: ${{ needs.deploy.result == 'success' && 'success' || needs.deploy.result == 'cancelled' && 'warning' || 'failure' }}
          fields: |
            [
              {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
              {"name": "Actor", "value": "${{ github.actor }}", "inline": true}
            ]
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
