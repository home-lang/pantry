name: Build Zig (All Platforms)

on:
  push:
    branches: [main]
    paths:
      - 'packages/zig/**'
      - '.github/workflows/build-zig.yml'
  pull_request:
    paths:
      - 'packages/zig/**'
      - '.github/workflows/build-zig.yml'
  workflow_dispatch:

concurrency:
  group: build-zig-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-all:
    name: compile-all
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry & install deps (zig from deps.yaml)
        uses: ./packages/action

      - name: Clone zig deps
        run: |
          # Pantry install may create empty `pantry/$repo` directories
          # without populating their sources (when the registry copy is
          # stale or unavailable). A bare directory check skips the clone
          # in that case and the build then fails with `file_hash
          # FileNotFound`. Probe for an actual source file instead.
          mkdir -p pantry
          for repo in zig-cli zig-config zig-test-framework; do
            if [ ! -f "pantry/$repo/src/root.zig" ] && [ ! -f "pantry/$repo/src/lib.zig" ] && [ ! -f "pantry/$repo/src/zig-config.zig" ]; then
              echo "Cloning $repo ..."
              rm -rf "pantry/$repo"
              git clone --depth 1 "https://github.com/zig-utils/$repo.git" "pantry/$repo"
            else
              echo "$repo already present"
            fi
          done

      - name: Build for All Platforms
        run: |
          set -e
          cd packages/zig
          zig build compile-all

      - name: Verify critical targets
        run: |
          set -e
          cd packages/zig/zig-out/bin
          echo "Built binaries:"
          ls -la
          for required in linux-x86_64 macos-aarch64; do
            if [ ! -d "$required" ]; then
              echo "::error::Required target $required not found"
              exit 1
            fi
          done
