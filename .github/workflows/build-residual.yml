name: Build Residual (non-pkgx recipes)

# The handful of catalogued packages pkgx does NOT host and that aren't custom
# builds — so the download-only mirror (mirror.yml) can't complete them. They DO
# have their own recipes (a .dmg/github-release download for the apps, a source
# compile for the rest), so we build them here through --pkgx-mirror, which tries
# pkgx first (always a miss for these) and falls back to the recipe's own build.
# Runs on NATIVE runners (macOS for the darwin apps, ubuntu for the linux tools);
# each recipe's `platforms:` constraint routes it to the right ones. Weekly — these
# change rarely. (grub / xorriso / mail-os-mail have NO recipe and are skipped.)
on:
  schedule:
    - cron: '0 4 * * 1' # Mondays 04:00 UTC
  workflow_dispatch:
    inputs:
      packages:
        description: 'Override the package list (comma-separated). Empty = the default residual set.'
        required: false
        type: string

env:
  PANTRY_REGISTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}
  STORAGE_PROVIDER: ${{ vars.STORAGE_PROVIDER || 'aws' }}
  S3_BUCKET: ${{ vars.S3_BUCKET || 'pantry-registry' }}
  S3_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
  S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
  AWS_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
  S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
  S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
  # The non-pkgx residual that DOES have a recipe. Apps download a .dmg/release;
  # the rest compile from source. Recipe `platforms:` keeps each on valid runners.
  RESIDUAL_PACKAGES: 'karabiner-elements.pqrs.org,linear.app,strace.io,systemd.io,gource.io,vapoursynth.com,langchain.com,agpt.co,tea.xyz,gnu.org/xorriso,gnu.org/grub'

permissions:
  contents: read

jobs:
  build:
    name: Residual (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux-x86-64, os: ubuntu-latest }
          - { name: linux-arm64, os: ubuntu-24.04-arm }
          - { name: darwin-arm64, os: macos-15 }
          - { name: darwin-x86-64, os: macos-15-intel }
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: ${{ contains(matrix.platform.os, 'macos') && 70 || 120 }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: ./packages/action
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: bun install

      - name: Build residual packages
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/ts-pantry
          PKGS="${{ github.event.inputs.packages || env.RESIDUAL_PACKAGES }}"
          # --pkgx-mirror (NOT --mirror-only): try pkgx (a miss for these), then fall
          # back to the recipe's own build. Recipe platforms: constraints skip a
          # package on an unsupported runner (e.g. karabiner won't run on linux).
          bun scripts/build-all-packages.ts \
            -b "$S3_BUCKET" -r "$AWS_REGION" \
            --platform "${{ matrix.platform.name }}" \
            -p "$PKGS" \
            --pkgx-mirror --multi-version --max-versions 5
