name: Update Packages

on:
  schedule:
    # Run every 20 minutes
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-packages:
    name: Update packages and index
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fetch versions from recipes (GitHub API)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/ts-pantry
          echo "Fetching versions from native TS recipes..."
          bun scripts/version-fetcher.ts 2>&1 || true
        timeout-minutes: 15

      - name: Generate index
        run: cd packages/ts-pantry && bun bin/cli.ts generate-index
        timeout-minutes: 5

      - name: Generate aliases
        run: cd packages/ts-pantry && bun bin/cli.ts generate-aliases
        timeout-minutes: 5

      - name: Check for changes
        id: git-check
        run: |
          CHANGES=$(git status --porcelain packages/ts-pantry/src/packages/ 2>/dev/null || echo "")
          if [[ -z "$CHANGES" ]]; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No version changes detected"
          else
            echo "Changes detected:"
            echo "$CHANGES"
            echo "changes=true" >> $GITHUB_OUTPUT

            # Count changed packages
            TOTAL=$(echo "$CHANGES" | wc -l | tr -d ' ')
            echo "total_updated=$TOTAL" >> $GITHUB_OUTPUT
          fi

      - name: Generate commit message
        id: commit-message
        if: steps.git-check.outputs.changes == 'true'
        run: |
          # Extract package names from changed files
          CHANGED_FILES=$(git status --porcelain packages/ts-pantry/src/packages/ | grep "^ M " | awk '{print $2}')
          PACKAGES=""
          while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue
            [ -f "$filepath" ] || continue
            case "$filepath" in */aliases.ts|*/generated-*|*/index.ts) continue ;; esac
            NAME=$(grep -m 1 "name: '" "$filepath" 2>/dev/null | sed "s/.*name: '//" | sed "s/' as const.*//" | tr -d '\n\r')
            [ -z "$NAME" ] && continue
            PACKAGES="${PACKAGES:+$PACKAGES, }$NAME"
          done <<< "$CHANGED_FILES"

          TOTAL="${{ steps.git-check.outputs.total_updated }}"
          if [ "$TOTAL" -le 4 ] && [ -n "$PACKAGES" ]; then
            echo "commit_message=chore: update $PACKAGES" >> $GITHUB_OUTPUT
          elif [ -n "$PACKAGES" ]; then
            SHORT=$(echo "$PACKAGES" | cut -d',' -f1-3)
            REMAINING=$((TOTAL - 3))
            echo "commit_message=chore: update $SHORT and $REMAINING others" >> $GITHUB_OUTPUT
          else
            echo "commit_message=chore: update $TOTAL packages" >> $GITHUB_OUTPUT
          fi

      - name: Safeguard
        id: deletion-check
        if: steps.git-check.outputs.changes == 'true'
        run: |
          DELETED=$(git diff --diff-filter=D --name-only HEAD -- packages/ts-pantry/src/packages/ | wc -l | tr -d ' ')
          if [ "$DELETED" -gt 50 ]; then
            echo "ERROR: $DELETED files deleted, exceeds threshold"
            echo "safe_to_commit=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "safe_to_commit=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        id: commit
        if: steps.git-check.outputs.changes == 'true' && steps.deletion-check.outputs.safe_to_commit == 'true'
        run: |
          if [ -n "${{ secrets.PAT_TOKEN }}" ]; then
            git config --global user.name "chrisbreuer"
            git config --global user.email "chrisbreuer93@gmail.com"
            git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
          else
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi

          git add packages/ts-pantry/src/packages/
          git commit -m "${{ steps.commit-message.outputs.commit_message }}" -m "Automated version update via GitHub API"
          git stash --include-untracked
          if ! git pull --rebase origin refs/heads/main; then
            echo "::warning::Rebase failed, aborting rebase and retrying with merge"
            git rebase --abort
            git pull origin refs/heads/main
          fi
          git stash pop || true
          git push origin HEAD:refs/heads/main

          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Trigger builds for updated packages
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 -- packages/ts-pantry/src/packages/ 2>/dev/null)
          [ -z "$CHANGED" ] && exit 0

          DOMAINS=""
          while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue
            [ -f "$filepath" ] || continue
            case "$filepath" in */aliases.ts|*/generated-*|*/index.ts) continue ;; esac
            DOMAIN=$(grep -m 1 "domain:" "$filepath" 2>/dev/null | sed "s/.*domain: '//" | sed "s/' as const.*//" | tr -d ' \n\r')
            [ -z "$DOMAIN" ] && continue
            DOMAINS="${DOMAINS:+$DOMAINS,}$DOMAIN"
          done <<< "$CHANGED"

          [ -z "$DOMAINS" ] && exit 0
          echo "Triggering build for: $DOMAINS"
          # Use unix (darwin+linux) — system packages have Unix build scripts
          gh workflow run build.yml -f packages="$DOMAINS" -f force=false -f platform=unix
        timeout-minutes: 2

      - name: discord-failure-alert
        if: failure()
        uses: ./.github/actions/discord-notify
        with:
          title: Update Packages — Failed
          description: Version update workflow failed
          status: failure
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
